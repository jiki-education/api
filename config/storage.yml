test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Amazon S3 for Active Storage (exercise submission files)
# Production uses IAM role authentication (ECS task role); dev/test use the
# same LocalStack instance as R2.
amazon:
  service: S3
  region: <%= Jiki.config.s3_active_storage_region %>
  bucket: <%= Jiki.config.s3_active_storage_bucket %>
<% unless Jiki.env.production? %>
  # LocalStack needs path-style addressing; the default checksum handling
  # (unlike Cloudflare R2) works fine, so no checksum overrides here.
  endpoint: <%= Jiki.config.r2_endpoint %>
  access_key_id: FAKE
  secret_access_key: FAKE
  force_path_style: true
<% end %>

# Cloudflare R2 for user uploads (avatars, etc.)
# Uses S3-compatible API with public access via uploads.jiki.io
# In dev/test, uses LocalStack S3; in production, uses Cloudflare R2
r2:
  service: S3
  endpoint: <%= Jiki.config.r2_endpoint %>
  access_key_id: <%= Jiki.secrets.r2_access_key_id %>
  secret_access_key: <%= Jiki.secrets.r2_secret_access_key %>
  region: auto
  bucket: <%= Jiki.config.r2_bucket_uploads %>
  public: true
  force_path_style: true
  # R2 rejects the AWS SDK's default CRC32 request checksum with
  # "You can only specify one non-default checksum at a time", so only
  # send/validate checksums when strictly required. Mirrors the patch
  # applied to Jiki.r2_client in the jiki-config gem.
  request_checksum_calculation: when_required
  response_checksum_validation: when_required

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# Use bin/rails credentials:edit to set the Azure Storage secret (as azure_storage:storage_access_key)
# microsoft:
